<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Projectile Motion Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Projectile Motion Simulator</h1>
    <p>Adjust parameters and watch the projectile(s) fly! All values are in real-world units (meters, m/s).</p>

    <h2>Projectile 1</h2>
    <div>
      <label for="velocitySlider">Initial Velocity 1 (m/s): <span id="velocityValue">20</span></label><br />
      <input type="range" id="velocitySlider" min="2" max="60" value="20" />
    </div>
    <div>
      <label for="angleSlider">Launch Angle 1 (degrees): <span id="angleValue">45</span></label><br />
      <input type="range" id="angleSlider" min="5" max="90" value="45" />
    </div>
    <hr>
    <h2>Projectile 2</h2>
    <div>
      <label for="velocity2Slider">Initial Velocity 2 (m/s): <span id="velocity2Value">24</span></label><br />
      <input type="range" id="velocity2Slider" min="2" max="60" value="24" />
    </div>
    <div>
      <label for="angle2Slider">Launch Angle 2 (degrees): <span id="angle2Value">60</span></label><br />
      <input type="range" id="angle2Slider" min="5" max="90" value="60" />
    </div>

    <hr>
    <h2>Display</h2>
    <div>
      <label for="scaleSlider">Scale (pixels per meter): <span id="scaleValue">15</span></label><br />
      <input type="range" id="scaleSlider" min="4" max="40" value="15" />
    </div>

    <div class="button-row">
      <div class="left-buttons">
        <button id="resetButton">Reset Simulation</button>
        <button id="toggleRealTimeButton">Real Time: ON</button>
      </div>
      <div class="right-buttons">
        <button id="zoomInButton">Zoom In</button>
        <button id="zoomOutButton">Zoom Out</button>
        <button id="resetZoomButton">Reset Zoom</button>
      </div>
    </div>

    <p id="stateLabel">Press SPACE to launch</p>
    <p id="zoomDisplay">Camera Zoom: 1.00×</p>
  </main>
  <script src="sketch.js"></script>
</body>
</html>
